name: snapshot

on:
  schedule:
    # раз в час; частить не нужно — финалы этапов замораживаются
    - cron: "17 * * * *"
  workflow_dispatch: {}

# не запускать параллельные прогоны (перезапись data/)
concurrency:
  group: snapshot
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Продьюсеры — с continue-on-error: один сломанный источник не блокирует
      # остальные и коммит. Реальный результат каждого уходит в health-шаг через
      # steps.<id>.outcome; health валит job (→ письмо GitHub), если что-то упало.
      - name: Собрать снапшоты IMSA
        id: imsa
        continue-on-error: true
        run: npm run imsa

      - name: Зеркало F1 (Jolpica)
        id: f1
        continue-on-error: true
        run: npm run f1

      - name: Зеркало OpenF1 (детали протокола)
        id: openf1
        continue-on-error: true
        run: npm run openf1

      - name: Зеркало WEC (fiawec)
        id: wec
        continue-on-error: true
        run: npm run wec

      - name: Решения стюардов WEC (Notice Board)
        id: wecfia
        continue-on-error: true
        run: npm run wecfia

      - name: Решения стюардов FIA (штрафы)
        id: fia
        continue-on-error: true
        run: npm run fia

      - name: Победители прошлых лет (Jolpica)
        id: winners
        continue-on-error: true
        run: npm run winners

      - name: Хайлайты уик-энда (деривация из зеркала)
        id: highlights
        continue-on-error: true
        run: npm run highlights

      - name: Юбилеи пилотов (Jolpica)
        id: milestones
        continue-on-error: true
        run: npm run milestones

      - name: Статистика сейфти-каров (OpenF1)
        id: safetycar
        continue-on-error: true
        run: npm run safetycar

      # Пишет data/health.json (дневной heartbeat — держит крон живым в
      # межсезонье + сигнал устаревания приложению). Реальные результаты
      # продьюсеров приходят через steps.<id>.outcome. Только пишет файл.
      - name: Health heartbeat
        if: always()
        env:
          IMSA_OUTCOME: ${{ steps.imsa.outcome }}
          F1_OUTCOME: ${{ steps.f1.outcome }}
          OPENF1_OUTCOME: ${{ steps.openf1.outcome }}
          WEC_OUTCOME: ${{ steps.wec.outcome }}
          FIA_OUTCOME: ${{ steps.fia.outcome }}
        run: npm run health

      - name: Закоммитить изменения
        if: always()
        run: |
          git config user.name  "overlap-bot"
          git config user.email "overlap-bot@users.noreply.github.com"
          git add data
          if git diff --cached --quiet; then
            echo "нет изменений"
            exit 0
          fi
          git commit -m "snapshot $(date -u +%FT%TZ)"
          # Устойчивый push: транзиентный сетевой/GitHub-блип или гонка с чужим
          # коммитом не должны валить job (иначе владельцу летит ложное письмо).
          # До 5 попыток: подчистить недоделанный rebase от прошлой итерации →
          # заново rebase на свежий main → push. Выходим по первому успеху.
          for attempt in 1 2 3 4 5; do
            git rebase --abort 2>/dev/null || true
            if git pull --rebase --autostash origin main && git push; then
              echo "push ок с попытки $attempt"
              exit 0
            fi
            echo "::warning::push не удался (попытка $attempt/5), повтор через 10с"
            sleep 10
          done
          echo "::error::push не удался после 5 попыток"
          exit 1

      # Гейт алерта: любой продьюсер с outcome=failure валит job → GitHub шлёт
      # владельцу письмо. Данные/heartbeat уже закоммичены выше (это отдельный
      # шаг после), поэтому падение не мешает публикации того, что собралось.
      - name: Проверка продьюсеров
        if: always()
        run: |
          FAILED=""
          for p in "imsa=${{ steps.imsa.outcome }}" "f1=${{ steps.f1.outcome }}" \
                   "openf1=${{ steps.openf1.outcome }}" "wec=${{ steps.wec.outcome }}" \
                   "fia=${{ steps.fia.outcome }}" "wecfia=${{ steps.wecfia.outcome }}" "winners=${{ steps.winners.outcome }}" "highlights=${{ steps.highlights.outcome }}" "milestones=${{ steps.milestones.outcome }}" "safetycar=${{ steps.safetycar.outcome }}"; do
            name="${p%%=*}"; outcome="${p##*=}"
            if [ "$outcome" = "failure" ]; then FAILED="$FAILED $name"; fi
          done
          if [ -n "$FAILED" ]; then
            echo "::error::упали продьюсеры:$FAILED — см. data/health.json"
            exit 1
          fi
          echo "все продьюсеры ОК"
